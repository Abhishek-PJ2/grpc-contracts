syntax = "proto3";

package company.grpc.payment;

option java_package = "com.company.grpc.payment";
option java_multiple_files = true;

import "common/common.proto";

service PaymentService {
  rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);
  rpc GetPaymentfrom (PaymentRequest) returns (PaymentResponse);

}

message PaymentRequest {
  string order_id = 1;
  company.grpc.common.Money amount = 2;
}

message PaymentResponse {
  string payment_id = 1;
  string status = 2;
}
